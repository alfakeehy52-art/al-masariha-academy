<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تعيين كلمة مرور جديدة | أكاديمية المسارحة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    body{margin:0;font-family:'Cairo',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at top,rgba(212,175,55,.10),transparent 28%),linear-gradient(180deg,#09111f,#0d1628);color:#ecf2ff}
    .box{width:min(420px,100%);background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:26px;box-shadow:0 18px 45px rgba(0,0,0,.22)}
    h2{margin:0 0 8px;color:#f5d46b;font-size:28px;font-weight:900}
    p{margin:0 0 18px;color:#9fb0d1;line-height:1.8;font-size:14px}
    label{display:block;margin:0 0 8px;font-weight:800}
    input{width:100%;box-sizing:border-box;padding:14px 16px;margin:0 0 14px;background:rgba(7,12,22,.72);color:#ecf2ff;border:1px solid rgba(255,255,255,.10);border-radius:14px;font:inherit}
    button{width:100%;padding:14px 16px;border:none;border-radius:14px;cursor:pointer;background:linear-gradient(135deg,#d4af37,#f5d46b);color:#1a1a1a;font-family:inherit;font-weight:900;font-size:16px}
    button:disabled{opacity:.65;cursor:not-allowed}
    .msg{margin-top:12px;padding:10px 12px;border-radius:12px;font-weight:800;display:none;line-height:1.7;font-size:13px}
    .msg.show{display:block}
    .msg.err{background:rgba(255,107,107,.12);border:1px solid rgba(255,107,107,.25);color:#ffd9d9}
    .msg.ok{background:rgba(21,145,95,.12);border:1px solid rgba(21,145,95,.28);color:#caffdd}
    .back{display:inline-block;margin-top:16px;color:#9fb0d1;text-decoration:none;font-weight:800;font-size:13px}
    .loading{color:#9fb0d1;font-weight:800;text-align:center;padding:12px 0}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth-password-reset.js"></script>
</head>
<body>
  <div class="box">
    <h2>كلمة مرور جديدة</h2>
    <p id="lead">جاري التحقق من الرابط…</p>
    <div id="loading" class="loading">انتظر قليلاً</div>
    <div id="formWrap" hidden>
      <label for="pass1">كلمة المرور الجديدة</label>
      <input id="pass1" type="password" autocomplete="new-password" />
      <label for="pass2">تأكيد كلمة المرور</label>
      <input id="pass2" type="password" autocomplete="new-password" />
      <button type="button" id="saveBtn">حفظ كلمة المرور</button>
    </div>
    <div id="msg" class="msg"></div>
    <a class="back" id="backLink" href="admin_login.html">← العودة لتسجيل الدخول</a>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const kind =
      params.get("type") === "staff"
        ? "staff"
        : typeof readResetPortal === "function"
          ? readResetPortal()
          : "admin";
    const loginPage = kind === "staff" ? "staff_login.html" : "admin_login.html";
    document.getElementById("backLink").href = loginPage;

    const msgEl = document.getElementById("msg");
    const formWrap = document.getElementById("formWrap");
    const loadingEl = document.getElementById("loading");
    const leadEl = document.getElementById("lead");
    const saveBtn = document.getElementById("saveBtn");

    function showMsg(text, type) {
      msgEl.textContent = text;
      msgEl.className = "msg show " + (type === "ok" ? "ok" : "err");
    }

    async function boot() {
      const session = await waitForRecoverySession(12000);
      loadingEl.hidden = true;
      if (!session) {
        leadEl.textContent = "تعذر التحقق من الرابط";
        showMsg(
          "انتهت صلاحية الرابط أو فُتح على صفحة خاطئة. اطلب رابطاً جديداً من صفحة «نسيت كلمة المرور».",
          "err"
        );
        return;
      }
      leadEl.textContent = "اختر كلمة مرور جديدة (8 أحرف على الأقل) ثم احفظها.";
      formWrap.hidden = false;
    }

    saveBtn.addEventListener("click", async () => {
      const p1 = document.getElementById("pass1").value;
      const p2 = document.getElementById("pass2").value;
      if (p1.length < 8) {
        showMsg("كلمة المرور قصيرة — 8 أحرف على الأقل.", "err");
        return;
      }
      if (p1 !== p2) {
        showMsg("تأكيد كلمة المرور غير متطابق.", "err");
        return;
      }
      saveBtn.disabled = true;
      saveBtn.textContent = "جاري الحفظ...";
      try {
        await completePasswordReset(p1);
        formWrap.hidden = true;
        showMsg("تم تحديث كلمة المرور. سجّل الدخول الآن.", "ok");
        setTimeout(() => {
          location.href = loginPage;
        }, 2200);
      } catch (e) {
        showMsg(e?.message || "تعذر الحفظ.", "err");
        saveBtn.disabled = false;
        saveBtn.textContent = "حفظ كلمة المرور";
      }
    });

    boot();
  </script>
</body>
</html>
