<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>المدربون | أكاديمية المسارحة لكرة القدم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared-layout.css">
<link rel="stylesheet" href="coaches.page.css">
<style>
:root{
  --bg:#05110b;--panel:#081a12;--panel2:#0c1d15;
  --gold:var(--site-gold,#d5b15a);--gold-soft:var(--site-gold-soft,#f0d58f);
  --text:#f4f5ef;--muted:#b8c4bc;--line:rgba(255,255,255,.08);--green:var(--site-green,#0f6a47);
}
*{box-sizing:border-box}body{margin:0;font-family:'Cairo',system-ui,sans-serif;background:radial-gradient(circle at top, rgba(213,177,90,.08), transparent 25%),linear-gradient(180deg,#030a07,#06130d 22%,#041009 100%);color:var(--text)}a{text-decoration:none;color:inherit}.container{width:min(1380px,calc(100% - 48px));margin:auto}
.coaches-page-shell{padding-top:18px}
.hero{padding:24px 0 18px}.hero-shell{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:28px;background:#07160f;box-shadow:0 22px 50px rgba(0,0,0,.35);min-height:360px}.hero-bg{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.1),rgba(0,0,0,.62)),linear-gradient(90deg,rgba(0,0,0,.08),rgba(0,0,0,.45)),url('https://images.unsplash.com/photo-1547347298-4074fc3086f0?auto=format&fit=crop&w=1800&q=80') center/cover no-repeat}.hero-content{position:relative;z-index:2;padding:54px 42px 36px;display:grid;grid-template-columns:1fr auto;gap:24px;align-items:end}.hero h2{margin:0;font-size:72px;line-height:1.02;font-weight:900}.hero p{margin:14px 0 0;font-size:24px;color:#dfe5df;max-width:780px}.hero-stats{display:flex;gap:16px;flex-wrap:wrap}.hero-stat{min-width:160px;background:rgba(8,24,16,.72);border:1px solid rgba(213,177,90,.18);border-radius:20px;padding:16px 18px;text-align:center;backdrop-filter:blur(6px)}.hero-stat .n{font-size:34px;font-weight:900;color:var(--gold)}.hero-stat .t{font-size:15px;color:#cad4cc;margin-top:4px}
.main{padding:26px 0 36px}.layout{display:grid;grid-template-columns:310px 1fr;gap:24px}.sidebar,.content-card{background:linear-gradient(180deg,rgba(9,28,19,.94),rgba(5,17,11,.96));border:1px solid rgba(51,79,62,.9);border-radius:26px;box-shadow:0 20px 40px rgba(0,0,0,.15)}.sidebar{padding:22px}.side-title{margin:0 0 18px;font-size:28px;font-weight:900}.search{width:100%;height:52px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:#fff;padding:0 16px;font-family:inherit;font-size:15px}.filter-block{margin-top:22px}.filter-block h4{margin:0 0 12px;font-size:20px;font-weight:900}.pills{display:flex;flex-wrap:wrap;gap:10px}.pill{padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid var(--line);font-size:14px;color:#d9e0dc;cursor:pointer;user-select:none}.pill.active{background:rgba(213,177,90,.14);border-color:rgba(213,177,90,.4);color:var(--gold-soft)}.reset-btn{margin-top:24px;width:100%;height:48px;border:none;border-radius:16px;background:linear-gradient(180deg,#138256,#0d6e49);color:white;font-weight:900;font-family:inherit;font-size:16px;cursor:pointer}
.content-card{padding:22px}.content-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}.content-head h3{margin:0;font-size:34px;font-weight:900}.head-actions{display:flex;gap:10px;flex-wrap:wrap}.small-btn{min-height:42px;padding:0 16px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.03);font-size:14px;font-weight:800;color:#dce2de}
.coaches-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.coach{background:linear-gradient(180deg,#102117,#09130d);border:1px solid rgba(213,177,90,.22);border-radius:24px;overflow:hidden;transition:.2s ease}.coach:hover{transform:translateY(-4px);border-color:rgba(213,177,90,.45)}.coach .photo{height:320px;background:linear-gradient(135deg,#102518,#0a1610);display:grid;place-items:end center;padding-bottom:10px;position:relative;overflow:hidden}.coach .photo img{width:100%;height:100%;object-fit:cover}.coach .avatar-fallback{font-size:120px;line-height:1}.badge{position:absolute;top:14px;right:14px;padding:7px 12px;border-radius:999px;background:rgba(213,177,90,.16);border:1px solid rgba(213,177,90,.35);color:var(--gold-soft);font-size:13px;font-weight:800}.code{position:absolute;left:16px;bottom:12px;font-size:24px;font-weight:900;color:rgba(255,255,255,.92);background:rgba(0,0,0,.28);padding:6px 10px;border-radius:12px}.coach .meta{padding:16px}.coach .meta b{display:block;font-size:28px;line-height:1.2}.coach .meta .job{display:block;color:#75d6a1;font-size:18px;margin-top:4px}.coach .meta small{display:block;color:#cad4cc;font-size:15px;margin-top:5px}.coach-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}.coach-stats div{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:14px;padding:10px 8px;text-align:center}.coach-stats strong{display:block;font-size:20px}.coach-stats em{display:block;font-style:normal;color:#c2ccc4;font-size:12px;margin-top:4px}.coach-bio{margin-top:14px;color:#d9e0dc;line-height:1.8;font-size:14px;min-height:72px}.view-btn{display:block;margin-top:14px;text-align:center;background:linear-gradient(180deg,#138256,#0d6e49);color:white;padding:12px 14px;border-radius:14px;font-weight:900}
.empty-card{padding:40px 26px;border:1px dashed rgba(213,177,90,.28);border-radius:22px;background:rgba(255,255,255,.02);text-align:center;color:#c8d2cb}.empty-card h4{margin:0 0 10px;font-size:26px}.empty-card p{margin:0;line-height:1.9}
@media (max-width:1200px){.layout{grid-template-columns:1fr}.coaches-grid{grid-template-columns:repeat(2,1fr)}.hero-content{grid-template-columns:1fr}.hero h2{font-size:48px}}@media (max-width:768px){.coaches-grid{grid-template-columns:1fr}.hero h2{font-size:36px}.hero p{font-size:18px}.content-head h3,.side-title{font-size:26px}}
</style>
</head>
<body class="coaches-page inner-page">
<div id="site-header"></div>
<div class="coaches-page-shell">
<section class="hero"><div class="container hero-shell"><div class="hero-bg"></div><div class="hero-content"><div><h2>المدربون</h2><p>كادر فني احترافي يقود تطوير المواهب داخل الأكاديمية، مع ملفات واضحة وتخصصات معروضة بصورة أنيقة ومقنعة.</p></div><div class="hero-stats"><div class="hero-stat"><div class="n" id="heroCoachCount">0</div><div class="t">إجمالي المدربين</div></div><div class="hero-stat"><div class="n" id="heroSpecialties">0</div><div class="t">تخصصات فنية</div></div><div class="hero-stat"><div class="n" id="heroCategories">0</div><div class="t">فئات يشرفون عليها</div></div></div></div></div></section>
<section class="main"><div class="container layout"><aside class="sidebar" aria-label="تصفية المدربين"><h3 class="side-title">تصفية البحث</h3><input class="search" id="searchInput" type="search" placeholder="ابحث بالاسم، التخصص، أو الرمز" autocomplete="off" />
<div class="filter-block"><h4>الفئة</h4><div class="pills" id="categoryPills"></div></div>
<div class="filter-block"><h4>التخصص</h4><div class="pills" id="specialtyPills"></div></div>
<button class="reset-btn" id="resetFiltersBtn">إعادة تعيين</button></aside>
<div class="content-card"><div class="content-head"><h3 id="resultTitle">عرض المدربين</h3><div class="head-actions"><button class="small-btn is-active" type="button" id="sortExperienceBtn">ترتيب حسب الخبرة</button><button class="small-btn" type="button" id="sortNameBtn">ترتيب أبجدي</button></div></div><div class="coaches-grid" id="coachesGrid" aria-live="polite"></div></div></div></section>
</div>
<div id="site-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/supabase-public-lookup.js"></script>
<script>
let allCoaches=[];
let currentCategory='الكل'; let currentSpecialty='الكل'; let currentSort='experience';
function readCoaches(){return allCoaches}
function escapeHtml(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
function getInitials(name){const text=String(name||'').trim();if(!text)return '👔';const parts=text.split(/\s+/).filter(Boolean);if(parts.length===1)return parts[0].slice(0,2);return (parts[0][0]||'')+(parts[1][0]||'')}
function uniq(list){return [...new Set(list.filter(Boolean))]}
function buildPills(containerId, values, activeValue, onClick){const wrap=document.getElementById(containerId);wrap.innerHTML='';['الكل',...values].forEach(value=>{const pill=document.createElement('div');pill.className='pill'+(value===activeValue?' active':'');pill.textContent=value;pill.addEventListener('click',()=>onClick(value));wrap.appendChild(pill);})}
function renderHeroStats(coaches){document.getElementById('heroCoachCount').textContent=coaches.length;document.getElementById('heroSpecialties').textContent=uniq(coaches.map(c=>c.specialty)).length;document.getElementById('heroCategories').textContent=uniq(coaches.map(c=>c.category)).length}
function getFilteredCoaches(){const coaches=readCoaches();const search=document.getElementById('searchInput').value.trim().toLowerCase();let result=coaches.filter(c=>{const matchesSearch=!search||[c.fullName,c.jobTitle,c.specialty,c.code,c.phone].join(' ').toLowerCase().includes(search);const matchesCategory=currentCategory==='الكل'||String(c.category||'').trim()===currentCategory;const matchesSpecialty=currentSpecialty==='الكل'||String(c.specialty||'').trim()===currentSpecialty;return matchesSearch&&matchesCategory&&matchesSpecialty});if(currentSort==='experience'){result=result.sort((a,b)=>(Number(b.experienceYears)||0)-(Number(a.experienceYears)||0));}else{result=result.sort((a,b)=>String(a.fullName||'').localeCompare(String(b.fullName||''),'ar'));}return result}
function render(){const all=readCoaches();renderHeroStats(all);buildPills('categoryPills',uniq(all.map(c=>c.category)),currentCategory,v=>{currentCategory=v;render()});buildPills('specialtyPills',uniq(all.map(c=>c.specialty)),currentSpecialty,v=>{currentSpecialty=v;render()});const coaches=getFilteredCoaches();document.getElementById('resultTitle').textContent=`عرض ${coaches.length} مدرب${coaches.length!==1?'ين':''}`;const grid=document.getElementById('coachesGrid');if(!coaches.length){grid.innerHTML=`<div class="empty-card" style="grid-column:1/-1"><h4>لا توجد نتائج مطابقة</h4><p>جرّب تغيير الفلاتر أو إضافة مدرب جديد من لوحة التحكم ليظهر هنا مباشرة.</p></div>`;return;}  grid.innerHTML=coaches.map(c=>`<article class="coach"><div class="photo">${c.image?`<img src="${escapeHtml(c.image)}" alt="${escapeHtml(c.fullName)}">`:`<div class="avatar-fallback">${escapeHtml(getInitials(c.fullName))}</div>`}<div class="badge">${escapeHtml(c.specialty||'مدرب')}</div><div class="code">${escapeHtml(c.code||'COA')}</div></div><div class="meta"><b>${escapeHtml(c.fullName)}</b><span class="job">${escapeHtml(c.jobTitle||'-')}</span><small>${escapeHtml(c.category||'-')} • ${escapeHtml(c.certification||'بدون شهادة مضافة')}</small><div class="coach-stats"><div><strong>${escapeHtml(String(c.experienceYears||0))}</strong><em>سنوات خبرة</em></div><div><strong>${escapeHtml(c.coachStatus||c.status||'نشط')}</strong><em>الحالة</em></div><div><strong>${escapeHtml(c.phone||'-')}</strong><em>الجوال</em></div></div><div class="coach-bio">${escapeHtml((c.bio||'لا توجد نبذة تعريفية حاليًا.')).slice(0,140)}</div><a class="view-btn" href="al_masariha_coach_profile.html?id=${encodeURIComponent(c.id)}">ملف المدرب</a></div></article>`).join('')}
document.getElementById('searchInput').addEventListener('input',render);document.getElementById('sortExperienceBtn').addEventListener('click',()=>{currentSort='experience';render()});document.getElementById('sortNameBtn').addEventListener('click',()=>{currentSort='name';render()});document.getElementById('resetFiltersBtn').addEventListener('click',()=>{currentCategory='الكل';currentSpecialty='الكل';currentSort='experience';document.getElementById('searchInput').value='';render()});
async function initCoachesPage(){
  const grid=document.getElementById('coachesGrid');
  grid.innerHTML='<div class="empty-card" style="grid-column:1/-1"><h4>جاري التحميل...</h4><p>يتم جلب المدربين.</p></div>';
  try{
    allCoaches=await listCoachesPublic();
    render();
  }catch(e){
    console.error('Coaches public load error:',e);
    grid.innerHTML='<div class="empty-card" style="grid-column:1/-1"><h4>تعذر تحميل المدربين</h4><p>حاول إعادة تحميل الصفحة لاحقاً.</p></div>';
  }
}
initCoachesPage();
</script>
<script src="js/site-seo.js"></script>
<script src="shared-layout.js"></script>
</body>
</html>
