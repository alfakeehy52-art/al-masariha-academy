<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>الصور والفيديو | أكاديمية المسارحة لكرة القدم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&amp;display=swap" rel="stylesheet"/>
<style>
body{margin:0;font-family:'Cairo',sans-serif;background:#05110b;color:white}
.container{width:min(1200px,calc(100% - 40px));margin:auto}
.hero{padding:40px 0;text-align:center}
.hero h1{font-size:40px;margin-bottom:10px}
.hero p{color:#c7d0ca;margin:0}
.live-pill{display:inline-block;padding:6px 12px;border-radius:999px;background:rgba(15,106,71,.15);border:1px solid rgba(15,106,71,.28);color:#9de2bf;font-size:12px;font-weight:900;vertical-align:middle;margin-inline-start:8px}
.gallery{margin-top:30px;display:grid;grid-template-columns:repeat(4,1fr);gap:15px}
.photo{height:170px;background:#0d1f17;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:50px;overflow:hidden;background-size:cover;background-position:center}
.videos{margin-top:40px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.video-card{background:#081a12;border:1px solid #24352c;border-radius:16px;overflow:hidden;text-decoration:none;color:inherit;display:block}
.video-thumb{height:180px;background:#0d1f17;display:flex;align-items:center;justify-content:center;font-size:60px;background-size:cover;background-position:center}
.video-content{padding:16px}
.video-content h3{margin:0 0 8px;font-size:20px}
.video-content p{margin:0;color:#c7d0ca;font-size:14px}
.empty-box{padding:32px;border:1px dashed rgba(213,177,90,.28);border-radius:18px;color:#b8c4bc;text-align:center;line-height:1.9;grid-column:1/-1}
@media (max-width:900px){.gallery{grid-template-columns:repeat(2,1fr)}.videos{grid-template-columns:1fr}}
</style>
<link href="shared-layout.css" rel="stylesheet"/>
<style id="footer-copy-fix">
#site-footer .site-copy,
#site-footer .site-copy *{text-align:center !important;}
</style>
</head>
<body><div id="site-header"></div>

<section class="hero">
<div class="container">
<h1>الصور والفيديو <span class="live-pill">بيانات حية</span></h1>
<p>أبرز لقطات التدريبات والمباريات.</p>
</div>
</section>
<section class="container">
<div class="gallery" id="mediaGallery">
<div class="empty-box">جاري تحميل الصور…</div>
</div>
<div class="videos" id="mediaVideos">
<div class="empty-box">جاري تحميل الفيديو…</div>
</div>
</section>

<div id="site-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/supabase-public-lookup.js"></script>
<script>
function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtDate(v){if(!v)return '';const d=new Date(v);if(Number.isNaN(d.getTime()))return '';return d.toLocaleDateString('ar-SA',{year:'numeric',month:'2-digit',day:'2-digit'})}
function photoHtml(m){
  const bg=m.imageUrl?` style="background-image:url('${esc(m.imageUrl)}')"`:'';
  const inner=m.imageUrl?'':esc(m.emoji||'📷');
  return `<div class="photo"${bg} title="${esc(m.title)}">${inner}</div>`;
}
function videoHtml(m){
  const thumb=m.imageUrl?` style="background-image:url('${esc(m.imageUrl)}')"`:'';
  const href=m.videoUrl?esc(m.videoUrl):'#';
  const target=m.videoUrl?' target="_blank" rel="noopener"':'';
  return `<a class="video-card" href="${href}"${target}>
    <div class="video-thumb"${thumb}>${m.imageUrl?'':esc(m.emoji||'▶')}</div>
    <div class="video-content">
      <h3>${esc(m.title)}</h3>
      <p>${esc(m.description||'')}${m.publishedAt?' · '+esc(fmtDate(m.publishedAt)):''}</p>
    </div>
  </a>`;
}
async function renderMedia(){
  const gallery=document.getElementById('mediaGallery');
  const videos=document.getElementById('mediaVideos');
  try{
    const list=typeof listMediaPublic==='function'?await listMediaPublic():[];
    const photos=list.filter(m=>m.mediaType==='photo');
    const vids=list.filter(m=>m.mediaType==='video');
    gallery.innerHTML=photos.length?photos.map(photoHtml).join(''):'<div class="empty-box">لا توجد صور منشورة.</div>';
    videos.innerHTML=vids.length?vids.map(videoHtml).join(''):'<div class="empty-box">لا توجد فيديوهات منشورة.</div>';
  }catch(e){
    console.error(e);
    gallery.innerHTML='<div class="empty-box">تعذر التحميل. حاول لاحقاً.</div>';
    videos.innerHTML='';
  }
}
document.addEventListener('DOMContentLoaded',renderMedia);
</script>
<script src="js/site-seo.js"></script>
<script src="shared-layout.js"></script>
</body>
</html>
