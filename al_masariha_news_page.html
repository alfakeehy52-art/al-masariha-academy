
<!DOCTYPE html>

<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>الأخبار | أكاديمية المسارحة لكرة القدم</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<style>
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:#05110b;
  color:white;
}
.container{
  width:min(1200px,calc(100% - 40px));
  margin:auto;
}
header{
  background:#06140e;
  border-bottom:1px solid #1f2e26;
}
.nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  min-height:70px;
}
.logo{
  font-weight:900;
  font-size:20px;
}
.menu{
  display:flex;
  gap:20px;
}
.menu a{
  color:#dcdcdc;
  text-decoration:none;
  font-weight:700;
}
.menu a.active{
  color:#d5b15a;
}
.hero{
  padding:40px 0 22px;
  text-align:center;
}
.hero h1{
  font-size:42px;
  margin:0 0 10px;
}
.hero p{
  color:#c7d0ca;
  margin:0;
}
.featured-news{
  margin-top:28px;
  display:grid;
  grid-template-columns:1.2fr .8fr;
  gap:20px;
}
.feature-card,.side-news{
  background:#081a12;
  border:1px solid #24352c;
  border-radius:18px;
  overflow:hidden;
}
.feature-image{
  height:320px;
  background:linear-gradient(135deg,#102518,#08130b);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:80px;
}
.feature-content{
  padding:24px;
}
.badge{
  display:inline-block;
  background:#0d6c48;
  padding:6px 12px;
  border-radius:20px;
  font-size:13px;
  font-weight:800;
  color:white;
}
.feature-content h2{
  margin:14px 0 10px;
  font-size:30px;
}
.feature-content p{
  margin:0;
  line-height:1.9;
  color:#c7d0ca;
}
.date{
  margin-top:14px;
  font-size:14px;
  color:#a9b6af;
}
.side-news{
  padding:20px;
}
.side-news h3{
  margin:0 0 16px;
  font-size:24px;
}
.side-item{
  padding:14px 0;
  border-bottom:1px solid #1f2e26;
}
.side-item:last-child{
  border-bottom:none;
}
.side-item strong{
  display:block;
  font-size:17px;
}
.side-item span{
  display:block;
  margin-top:6px;
  color:#a9b6af;
  font-size:13px;
}
.section{
  margin-top:34px;
}
.section h2{
  margin:0 0 16px;
  font-size:28px;
}
.news-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}
.news-card{
  background:#081a12;
  border:1px solid #24352c;
  border-radius:18px;
  overflow:hidden;
}
.news-image{
  height:190px;
  background:linear-gradient(135deg,#102518,#08130b);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:56px;
}
.news-content{
  padding:18px;
}
.news-content h3{
  margin:0 0 10px;
  font-size:22px;
  line-height:1.5;
}
.news-content p{
  margin:0;
  color:#c7d0ca;
  line-height:1.8;
  font-size:15px;
}
.news-content .date{
  margin-top:12px;
}
.read-more{
  display:inline-block;
  margin-top:14px;
  color:#d5b15a;
  font-weight:800;
  text-decoration:none;
}
footer{
  margin-top:60px;
  padding:20px 0;
  border-top:1px solid #1f2e26;
  text-align:center;
  color:#aaa;
}
@media (max-width:900px){
  .featured-news,.news-grid{
    grid-template-columns:1fr;
  }
}
@media (max-width:700px){
  .menu{
    display:none;
  }
  .hero h1{
    font-size:34px;
  }
}
</style>
<link href="shared-layout.css" rel="stylesheet"/>
<style id="footer-copy-fix">
#site-footer .site-copy,
#site-footer .site-copy *{
  text-align:center !important;
}
</style>

</head>
<body><div id="site-header"></div>

<section class="hero">
<div class="container">
<h1>أخبار الأكاديمية <span style="display:inline-block;padding:6px 12px;border-radius:999px;background:rgba(15,106,71,.15);border:1px solid rgba(15,106,71,.28);color:#9de2bf;font-size:12px;font-weight:900;vertical-align:middle">بيانات حية</span></h1>
<p>تابع آخر الأخبار والفعاليات والإنجازات من Supabase.</p>
<div class="featured-news" id="featured-news">
<div class="feature-card" style="grid-column:1/-1;padding:24px;color:#b8c4bc">جاري تحميل الأخبار…</div>
</div>
</div>
</section>
<section class="container section" id="all-news">
<h2>جميع الأخبار</h2>
<div class="news-grid" id="newsGrid">
<article class="news-card" style="grid-column:1/-1;padding:24px;color:#b8c4bc">جاري التحميل…</article>
</div>
</section>

<div id="site-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/supabase-public-lookup.js"></script>
<script>
function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtDate(v){if(!v)return '—';const d=new Date(v);if(Number.isNaN(d.getTime()))return '—';return d.toLocaleDateString('ar-SA',{year:'numeric',month:'2-digit',day:'2-digit'})}
function featureImage(n){
  if(n.imageUrl)return `<div class="feature-image" style="background:url('${esc(n.imageUrl)}') center/cover no-repeat"></div>`;
  return `<div class="feature-image">${esc(n.emoji||'📰')}</div>`;
}
function cardImage(n){
  if(n.imageUrl)return `<div class="news-image" style="background:url('${esc(n.imageUrl)}') center/cover no-repeat"></div>`;
  return `<div class="news-image">${esc(n.emoji||'📰')}</div>`;
}
async function renderNews(){
  const featured=document.getElementById('featured-news');
  const grid=document.getElementById('newsGrid');
  try{
    const list=typeof listNewsPublic==='function'?await listNewsPublic():[];
    if(!list.length){
      featured.innerHTML='<div class="feature-card" style="grid-column:1/-1;padding:28px;color:#b8c4bc;text-align:center">لا توجد أخبار منشورة. أضف أخبارًا من لوحة الإدارة.</div>';
      grid.innerHTML='<article class="news-card" style="grid-column:1/-1;padding:24px;color:#b8c4bc">لا توجد أخبار.</article>';
      return;
    }
    const main=list.find(n=>n.featured)||list[0];
    const side=list.filter(n=>n.id!==main.id).slice(0,4);
    featured.innerHTML=`
      <div class="feature-card">${featureImage(main)}
        <div class="feature-content">
          <span class="badge">${esc(main.category||'خبر')}</span>
          <h2>${esc(main.title)}</h2>
          <p>${esc(main.body||main.summary)}</p>
          <div class="date">${esc(fmtDate(main.publishedAt))}</div>
        </div>
      </div>
      <div class="side-news">
        <h3>آخر الأخبار</h3>
        ${side.map(n=>`<div class="side-item"><strong>${esc(n.title)}</strong><span>${esc(fmtDate(n.publishedAt))}</span></div>`).join('')||'<div class="side-item"><span>—</span></div>'}
      </div>`;
    grid.innerHTML=list.map(n=>`<article class="news-card">${cardImage(n)}
      <div class="news-content">
        <h3>${esc(n.title)}</h3>
        <p>${esc(n.summary||n.body)}</p>
        <div class="date">${esc(fmtDate(n.publishedAt))}</div>
        <a class="read-more" href="#featured-news">قراءة المزيد</a>
      </div>
    </article>`).join('');
  }catch(e){
    console.error(e);
    featured.innerHTML='<div class="feature-card" style="padding:28px;color:#b8c4bc">تعذر التحميل. حاول لاحقاً.</div>';
    grid.innerHTML='';
  }
}
document.addEventListener('DOMContentLoaded',renderNews);
</script>
<script src="js/site-seo.js"></script>
<script src="shared-layout.js"></script></body>
</html>
