<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>حسابي | لوحة الإدارة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin_theme.css" />
  <style>
    .account-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .field label{display:block;margin-bottom:8px;font-weight:800;color:var(--admin-gold-soft)}
    .field input{width:100%;min-height:46px;border-radius:14px;border:1px solid var(--admin-line);background:#0a1811;color:var(--admin-text);padding:10px 14px;font:inherit}
    .status-bar{margin:12px 0;padding:12px 16px;border-radius:14px;font-weight:800;display:none}
    .status-bar.ok{display:block;background:rgba(13,108,72,.2);border:1px solid rgba(13,108,72,.4);color:#d4ffe8}
    .status-bar.err{display:block;background:rgba(183,66,66,.16);color:#ffd8d8}
    .hint{color:var(--admin-muted);font-size:13px;line-height:1.8;margin-top:8px}
    @media(max-width:900px){.account-grid{grid-template-columns:1fr}}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/panel-rbac.js?v=20260529-rbac1"></script>
  <script src="js/panel-access.js?v=20260529-rbac1"></script>
  <script src="js/admin-auth.js"></script>
  <script src="js/admin-account.js?v=20260529-rbac1"></script>
  <script>requireAdmin().then(function (ok) { if (ok && window.adminAccountBoot) adminAccountBoot(); });</script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand"><h1>حسابي</h1><p>تحديث بياناتك الشخصية في لوحة الإدارة.</p></div>
      <div id="admin-sidebar"></div>
    </aside>
    <main class="main">
      <section class="hero">
        <div>
          <h2>حسابي</h2>
          <p>عدّل الاسم والجوال المعروضين. لتغيير كلمة المرور استخدم النموذج أدناه.</p>
        </div>
      </section>
      <div id="saveStatus" class="status-bar" role="status"></div>
      <section class="panel">
        <div class="panel-head"><h3>البيانات الشخصية</h3></div>
        <div class="panel-body account-grid">
          <div class="field"><label for="accEmail">البريد</label><input id="accEmail" readonly /></div>
          <div class="field"><label for="accRole">المسمى</label><input id="accRole" readonly /></div>
          <div class="field"><label for="accName">الاسم الكامل</label><input id="accName" /></div>
          <div class="field"><label for="accPhone">الجوال</label><input id="accPhone" /></div>
          <div class="field full" style="grid-column:1/-1">
            <button type="button" class="btn gold" id="saveProfileBtn">حفظ البيانات</button>
          </div>
        </div>
      </section>
      <section class="panel" style="margin-top:18px">
        <div class="panel-head"><h3>كلمة المرور</h3></div>
        <div class="panel-body account-grid">
          <div class="field"><label for="accPass">كلمة مرور جديدة</label><input id="accPass" type="password" autocomplete="new-password" /></div>
          <div class="field"><label for="accPass2">تأكيد كلمة المرور</label><input id="accPass2" type="password" autocomplete="new-password" /></div>
          <div class="field full" style="grid-column:1/-1">
            <button type="button" class="btn" id="savePassBtn">تحديث كلمة المرور</button>
            <p class="hint">يجب أن تكون 8 أحرف على الأقل.</p>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="admin_sidebar.js"></script>
</body>
</html>
